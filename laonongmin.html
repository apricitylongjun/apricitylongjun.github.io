<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>峡谷农场 - APRICITY的浇水排期器</title>
    <style>
        :root {
            --primary-color: #f39c12; 
            --primary-dark: #d35400;  
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border-color: #bdc3c7;
            --success-color: #27ae60; 
            --danger-color: #e74c3c; /* 紧急红色 */
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 10px 30px rgba(243, 156, 18, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 15px 50px; 
            font-size: 16px; 
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; margin: 0 0 10px 0; color: var(--text-main); font-weight: 900; letter-spacing: 1px;}
        .author-tag { 
            display: inline-block; 
            background: linear-gradient(135deg, #f1c40f, #e67e22); 
            color: #fff; 
            padding: 6px 16px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 900;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .card { 
            background: var(--card-bg); 
            border-radius: var(--radius-lg); 
            padding: 24px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
        }

        .instruction-box {
            background: #fdfae7;
            border: 2px dashed #f39c12;
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 25px;
        }
        .instruction-box h3 {
            margin: 0 0 10px 0;
            color: #d35400;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .instruction-box p { margin: 5px 0; font-size: 14px; line-height: 1.6; color: #57606f; }
        .instruction-box strong { color: #d35400; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }
        
        label { 
            display: block; 
            font-size: 15px; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: var(--text-main); 
        }

        select, input[type="number"], input[type="time"] { 
            width: 100%; 
            height: 52px; 
            padding: 0 16px; 
            border: 2px solid var(--border-color); 
            border-radius: var(--radius-md); 
            font-size: 17px; 
            color: var(--text-main);
            background-color: #fafbfc;
            transition: all 0.2s ease;
            appearance: none; 
            font-weight: bold;
        }
        
        select:focus, input:focus { 
            outline: none; 
            border-color: var(--primary-color); 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(243, 156, 18, 0.2); 
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .input-group { position: relative; }
        .input-group input { padding-right: 40px; }
        .input-group .suffix {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-sub); font-weight: bold; pointer-events: none;
        }

        .helper-text { font-size: 13px; color: var(--text-sub); margin-top: 8px; line-height: 1.4; font-weight: bold; }

        button { 
            background: linear-gradient(135deg, #f39c12, #d35400); 
            color: white; 
            border: none; 
            height: 60px; 
            font-size: 20px; 
            font-weight: 900; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s; 
            letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); }

        #resultSection { display: none; }
        
        .summary-box { 
            background: #e8f8f5; 
            border: 2px solid var(--success-color);
            padding: 20px; 
            border-radius: var(--radius-md); 
            margin-bottom: 25px; 
            text-align: center;
        }
        .summary-box p { margin: 8px 0 0 0; font-size: 16px; color: #2c3e50; font-weight: bold; }
        .summary-box .highlight { 
            font-size: 32px; 
            color: var(--success-color); 
            font-weight: 900; 
            display: block;
            margin-top: 5px;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        h3.section-title { font-size: 20px; margin: 0 0 20px 0; border-left: 5px solid var(--primary-color); padding-left: 12px; font-weight: 900;}

        .timeline { margin-left: 10px; border-left: 4px solid #fdebd0; padding-left: 25px; }
        .timeline-item { position: relative; margin-bottom: 35px; }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-item::before { 
            content: ''; position: absolute; left: -35px; top: 4px; width: 18px; height: 18px; 
            border-radius: 50%; background: white; border: 4px solid var(--primary-color); 
        }
        .timeline-item.final::before { background: var(--success-color); border-color: var(--success-color); box-shadow: 0 0 0 5px rgba(39, 174, 96, 0.2); }
        .timeline-item.danger::before { border-color: var(--danger-color); background: var(--danger-color); box-shadow: 0 0 0 5px rgba(231, 76, 60, 0.2); }
        
        .time-badge { font-size: 22px; font-weight: 900; color: var(--text-main); display: block; margin-bottom: 6px; }
        .act-title { font-size: 18px; font-weight: 900; color: #d35400; margin-bottom: 6px; }
        .act-title.final { color: var(--success-color); font-size: 22px; }
        .act-title.danger { color: var(--danger-color); font-size: 20px; animation: pulse 1s infinite; }
        .act-desc { font-size: 15px; color: var(--text-sub); line-height: 1.5; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌾 峡谷农场终极排期器</h1>
        <div class="author-tag">⚡ 算法作者：龙俊 ⚡</div>
    </div>

    <div class="instruction-box">
        <h3>📢 必看！电竞农场主防呆指南！！！</h3>
        <p>1️⃣ <strong>别让时间溢出！</strong> 蓄能槽满了不点，时间就白白流失了！容错率设个 <b>80%-90%</b>，去打把王者回来再收菜，稳如防御塔！😎</p>
        <p>2️⃣ <strong>现在几点？</strong> 抬头看看屏幕，精确填进【现在此时此刻时间】里！</p>
        <p>3️⃣ <strong>怎么操作？</strong> 严格按下面闹钟的 CD 走！</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>🍎 种的啥高阶作物？(决定你的蓄能槽上限！)</label>
            <select id="cropType" onchange="updateCropDefaults()">
                <option value="640">超大蓄能槽 (640分): 蓝莓 / 卷心菜 / 辣椒</option>
                <option value="320" selected>大型蓄能槽 (320分): 香蕉 / 柚子 / 西瓜</option>
                <option value="160">中型蓄能槽 (160分): 南瓜 / 茄子</option>
            </select>
        </div>

        <div class="grid-2 form-group">
            <div>
                <label>⏰ 现在此时此刻时间</label>
                <input type="time" id="startTime" value="14:00" required>
            </div>
            <div>
                <label>🛡️ 蓄能防溢出容错率</label>
                <div class="input-group">
                    <input type="number" id="safePercent" value="90" min="1" max="100" required>
                    <span class="suffix">%</span>
                </div>
                <div class="helper-text" id="safeHelper">90%最稳，预留时间打团！</div>
            </div>
        </div>

        <div class="grid-2 form-group">
            <div>
                <label>⏳ 距离成熟还剩 (小时)</label>
                <input type="number" id="remHours" value="12" min="0" required>
            </div>
            <div>
                <label>⏳ 剩余 (分钟)</label>
                <input type="number" id="remMins" value="0" min="0" max="59" required>
            </div>
        </div>

        <div class="form-group">
            <label>⚡ 蓄能槽已攒了多久？(分钟)</label>
            <input type="number" id="currentStored" value="0" min="0" placeholder="刚点完释放加速就填 0 ！别犹豫！">
        </div>

        <button onclick="generateStrategy()">🚀 一键排期！榨干每秒加速！</button>
    </div>

    <div class="card" id="resultSection">
        <div class="summary-box">
            <p>🎉 终极大招·瞬间秒熟时刻 🎉</p>
            <span class="highlight" id="finalTimeDisplay">23:36</span>
            <p id="totalCostDisplay" style="font-size: 15px; margin-top: 10px; color: #27ae60;">(现实中总共需要硬核爆肝：0小时)</p>
        </div>
        
        <h3 class="section-title">⏱️ 极限卡CD操作时间轴 (严格执行！)</h3>
        <div class="timeline" id="timelineList">
            </div>
    </div>
</div>

<script>
    function updateCropDefaults() {
        document.getElementById('safePercent').value = 90;
        document.getElementById('safeHelper').innerText = "90%最稳，预留时间打团！";
    }

    function addMinutes(timeStr, minsToAdd) {
        let [hours, mins] = timeStr.split(':').map(Number);
        let date = new Date();
        date.setHours(hours, mins, 0, 0);
        date.setMinutes(date.getMinutes() + minsToAdd);
        
        let padHours = String(date.getHours()).padStart(2, '0');
        let padMins = String(date.getMinutes()).padStart(2, '0');
        let nextDay = date.getDate() !== new Date().getDate() ? " (明天！)" : "";
        
        return `${padHours}:${padMins}${nextDay}`;
    }

    function generateStrategy() {
        const startTime = document.getElementById('startTime').value;
        const safePercent = parseInt(document.getElementById('safePercent').value);
        const maxCapacity = parseInt(document.getElementById('cropType').value);
        const remHours = parseInt(document.getElementById('remHours').value) || 0;
        const remMins = parseInt(document.getElementById('remMins').value) || 0;
        const currentStored = parseInt(document.getElementById('currentStored').value) || 0;

        if(safePercent <= 0 || safePercent > 100) {
            alert("大兄弟！容错率只能填 1 到 100 之间啊！！");
            return;
        }
        if(currentStored > maxCapacity) {
            alert("兄弟醒醒！你填的已攒时间都超过蓄能槽上限了！");
            return;
        }

        const targetSafe = Math.floor(maxCapacity * (safePercent / 100));
        const totalRemMins = remHours * 60 + remMins;
        let R = (totalRemMins - currentStored / 4) / 1.25;
        
        if (R <= 0) {
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('finalTimeDisplay').innerHTML = "就是现在！！";
            document.getElementById('totalCostDisplay').innerHTML = "别看表了！赶紧切回游戏疯狂点击释放！直接熟了！";
            document.getElementById('timelineList').innerHTML = "";
            return;
        }

        R = Math.ceil(R);
        let remainingR = R;
        let elapsed = 0;
        let actions = [];

        // 【重磅修复】溢出/接近溢出 紧急判定逻辑
        if (currentStored > 0) {
            if (currentStored >= targetSafe) {
                // 如果当前蓄能已经大于或等于容错线，不需要等，立即释放！
                actions.push({
                    time: elapsed, // 0分钟，也就是现在！
                    title: "🚨 紧急释放！蓄能已达标",
                    sub: `你目前的蓄力（${currentStored}分）已经超过了 ${safePercent}% 安全线！别等了，【现在立刻马上】切回去点加速！`,
                    isDanger: true
                });
            } else {
                // 正常的补齐逻辑
                let topOffTime = targetSafe - currentStored;
                if (remainingR > topOffTime) {
                    elapsed += topOffTime;
                    remainingR -= topOffTime;
                    actions.push({
                        time: elapsed,
                        title: "🛡️ 补齐容错线",
                        sub: `耐心等个 ${topOffTime} 分钟！蓄能达到你设定的 ${safePercent}% 阈值了，赶紧点加速！清空蓄力！`
                    });
                }
            }
        }

        let remainder = remainingR % targetSafe;
        if (remainder > 0 && remainingR > targetSafe) {
            elapsed += remainder;
            remainingR -= remainder;
            actions.push({
                time: elapsed,
                title: "🧹 清理烦人的零头时间",
                sub: `挂机 ${remainder} 分钟后点击释放！把不规则的余数消化掉，后面全是对齐的大招周期！`
            });
        }

        while (remainingR > 0) {
            let interval = Math.min(targetSafe, remainingR);
            elapsed += interval;
            remainingR -= interval;
            
            if (remainingR === 0) {
                actions.push({
                    time: elapsed,
                    title: "🔥🔥 终极斩杀！瞬间秒熟！",
                    sub: `最后一次点击！释放海量加速能量，作物进度条瞬间清零，原地爆熟！！！`,
                    isFinal: true
                });
            } else {
                actions.push({
                    time: elapsed,
                    title: "⚡ 稳如老狗的满血循环",
                    sub: `等 ${interval} 分钟（蓄能到了 ${safePercent}% ），准时按一下加速！完美卡CD，美滋滋！`
                });
            }
        }

        let hoursTotal = Math.floor(R / 60);
        let minsTotal = R % 60;
        
        document.getElementById('finalTimeDisplay').innerHTML = addMinutes(startTime, R);
        document.getElementById('totalCostDisplay').innerHTML = `(现实中总共需要硬核爆肝：${hoursTotal}小时 ${minsTotal}分钟)`;

        let timelineHtml = '';
        actions.forEach((act) => {
            let itemClass = act.isFinal ? "timeline-item final" : (act.isDanger ? "timeline-item danger" : "timeline-item");
            let titleClass = act.isFinal ? "act-title final" : (act.isDanger ? "act-title danger" : "act-title");
            timelineHtml += `
                <div class="${itemClass}">
                    <span class="time-badge">${addMinutes(startTime, act.time)}</span>
                    <div class="${titleClass}">${act.title}</div>
                    <div class="act-desc">${act.sub}</div>
                </div>
            `;
        });

        document.getElementById('timelineList').innerHTML = timelineHtml;
        document.getElementById('resultSection').style.display = 'block';
    }
</script>
</body>
</html>
